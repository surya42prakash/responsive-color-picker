<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COLOR PICKER</title>
    <link
      href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@500;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>CLICK A COLOR BUTTON TO CHANGE THE SCREEN</h2>

    <div class="nav">
      <button class="btn btn-purple">Purple</button>
      <button class="btn btn-pink">Pink</button>
      <button class="btn btn-brown">Brown</button>
      <button class="btn btn-olive">Olive</button>
      <button class="btn btn-green">Green</button>
      <button class="btn btn-lime">Lime</button>
    </div>

    <p class="active-label">Click a color button to get started!</p>
    <button class="reset-btn" id="resetBtn">↻ Reset</button>

    <script src="script.js"></script>
  </body>
</html>
